# Two masks share the same name: AnalysisFile.__init__ must raise.
priors:
  - name: CKM
    descriptions:
      - { parameter: 'CKM::abs(V_ub)', min: 3.0e-3, max: 4.5e-3, type: uniform }

likelihoods:
  - name: LL
    constraints:
      - 'B^+->tau^+nu::BR@Belle:2014A;form-factors=BCL2008-4'

posteriors:
  - name: p
    prior: [ CKM ]
    likelihood: [ LL ]

masks:
  - name: dup
    description:
      - { name: 'mask::dup1', expression: '<<B->pilnu::BR;l=e>>' }
  - name: dup
    description:
      - { name: 'mask::dup2', expression: '<<B->pilnu::BR;l=mu>>' }
