# ee -> D^*+D^*- angular coefficients #
# ##############################
#
# [Belle:2017C]
#
# arXiv:1707.09167 (Belle, 951 fb^-1; Zhukova et al.). Table III: the three
# helicity components sigma_TT, sigma_TL, sigma_LL of the e+e- -> D^*+ D^*-
# cross section, obtained from a 2D fit of the two D^* helicity angles in
# each sqrt(s) bin. They map onto the EOS observables ::sigma_TT/_TL/_LL,
# the transverse/longitudinal decomposition of the 1P1+5P1+5F1 final state.
# Cross sections in nb; means used as published (no rescaling).
#
# Range truncated to sqrt(s) <= 4.6 GeV (58 energies, 4.025 .. 4.595),
# matching the total-sigma constraint. (Negative central values are kept as
# published: dropping them would bias the Gaussian likelihood.)
#
# ONE combined constraint over all three coefficients x all energies. The 6%
# correlated systematic (caption) is a global scale that shifts TT, TL and LL
# coherently, so it induces nonzero *cross-coefficient* covariance that three
# separate constraints could not represent. The per-bin statistical
# correlation between TT/TL/LL from the joint angular fit is not published by
# Belle and is therefore (unavoidably) neglected.
#
# Observables stacked in block order [TT(58), TL(58), LL(58)]. Covariance
#   C_(a,i),(b,j) = delta_(a,i),(b,j) (stat^2 + uncorr^2) + (0.06 m_a,i)(0.06 m_b,j).
#
